<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Mahla Ifrane</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f5f5f5;
  text-align:center;
}

.header{
  height:100vh;
  background:url("https://upload.wikimedia.org/wikipedia/commons/3/3e/Ifrane_lion.jpg") center/cover;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  color:white;
}

.header h1{
  font-size:90px;
  margin:0;
  animation:glow 2s infinite alternate;
}

@keyframes glow{
  from{ text-shadow:0 0 10px #fff; }
  to{ text-shadow:0 0 30px #25D366; }
}

.btn{
  margin-top:20px;
  padding:15px 25px;
  background:#25D366;
  color:white;
  text-decoration:none;
  border-radius:10px;
}

.section{
  padding:40px;
}

.cards{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
}

.card{
  background:white;
  width:300px;
  border-radius:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
  overflow:hidden;
}

.card img{
  width:100%;
}

.footer{
  background:#222;
  color:white;
  padding:20px;
}
</style>

</head>

<body>

<div class="header">
  <h1>Mahla IFRANE</h1>
  <a class="btn" href="https://wa.me/212674425032">احجز الآن</a>
</div>

<div class="section">
  <h2>الشقق</h2>

  <div class="cards">
    <div class="card">
      <img src="https://upload.wikimedia.org/wikipedia/commons/6/6e/Ifrane_city.jpg">
      <h3>شقة وسط المدينة</h3>
    </div>

    <div class="card">
      <img src="https://upload.wikimedia.org/wikipedia/commons/3/3e/Ifrane_lion.jpg">
      <h3>شقة بإطلالة</h3>
    </div>
  </div>
</div>

<iframe src="https://maps.google.com/maps?q=ifrane&output=embed"
width="100%" height="300"></iframe>

<div class="footer">
  <p>Mahla Ifrane</p>
</div>

</body>
</html>
