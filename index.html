<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Mahla Ifrane</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background:#f5f5f5;
  text-align:center;
}

/* HEADER */
.header{
  height:100vh;
  background:url("https://upload.wikimedia.org/wikipedia/commons/3/3e/Ifrane_lion.jpg") center/cover;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  color:white;
}

.header h1{
  font-size:90px;
  animation: fadeIn 2s ease;
}

.header p{
  font-size:20px;
}

/* BUTTON */
.btn{
  margin-top:20px;
  padding:15px 30px;
  background:#25D366;
  color:white;
  text-decoration:none;
  border-radius:10px;
  font-size:18px;
}

/* SECTIONS */
.section{
  padding:50px 20px;
}

.cards{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
}

.card{
  background:white;
  width:300px;
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
  transition:0.3s;
}

.card:hover{
  transform:scale(1.05);
}

.card img{
  width:100%;
}

.card h3{
  margin:10px;
}

.card p{
  padding:0 10px;
}

/* SOCIAL */
.social{
  position:fixed;
  left:10px;
  top:40%;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.social a{
  background:black;
  color:white;
  padding:10px;
  border-radius:50%;
  text-decoration:none;
}

/* MAP */
iframe{
  width:100%;
  height:300px;
  border:0;
}

/* FOOTER */
.footer{
  background:#222;
  color:white;
  padding:20px;
}

/* ANIMATION */
@keyframes fadeIn{
  from{opacity:0; transform:translateY(-20px);}
  to{opacity:1;}
}
</style>

</head>

<body>

<!-- HEADER -->
<div class="header">
  <h1>Mahla IFRANE</h1>
  <p>شقق فاخرة للكراء اليومي في إفران</p>
  <a class="btn" href="https://wa.me/212674425032">📞 احجز الآن</a>

  <audio controls>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
  </audio>
</div>

<!-- APARTMENTS -->
<div class="section">
  <h2>🏡 الشقق المتوفرة</h2>

  <div class="cards">

    <div class="card">
      <img src="https://upload.wikimedia.org/wikipedia/commons/6/6e/Ifrane_city.jpg">
      <h3>شقة وسط المدينة</h3>
      <p>قريبة من كل الخدمات</p>
      <a class="btn" href="https://wa.me/212660183251">احجز</a>

    <div class="card">
      <img src="https://upload.wikimedia.org/wikipedia/commons/3/3e/Ifrane_lion.jpg">
      <h3>شقة بإطلالة رائعة</h3>
      <p>إطلالة على الطبيعة</p>
      <a class="btn" href="https://wa.me/212660183258">احجز</a>
    </div>

  </div>
</div>

<!-- SOCIAL -->
<div class="social">
  <a href="#">📘</a>
  <a href="#">📸</a>
</div>

<!-- MAP -->
<iframe src="https://maps.google.com/maps?q=ifrane&output=embed"></iframe>

<!-- FOOTER -->
<div class="footer">
  <p>📞 212674425032</p>
  <p>📞 212660183251</p>
  <p>📞 212660183258</p>
  <p>Mahla Ifrane © 2026</p>
</div>

</body>
</html>
