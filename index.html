<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mahla Ifrane</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;700&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Cairo', sans-serif;
  direction: rtl;
  background:#0f172a;
  color:white;
}

/* فيديو خلفية */
.video-bg {
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-1;
  filter:brightness(0.5);
}

/* Navbar */
.nav {
  position:fixed;
  width:100%;
  padding:15px;
  display:flex;
  justify-content:space-between;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(10px);
}

.logo {
  font-size:25px;
  font-weight:bold;
}

/* Hero */
.hero {
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

.hero h1 {
  font-size:80px;
  animation: glow 2s infinite alternate;
}

@keyframes glow {
  from { text-shadow:0 0 10px #00ffcc; }
  to { text-shadow:0 0 50px #00ffcc; }
}

.btn {
  margin-top:20px;
  padding:15px 30px;
  background:linear-gradient(45deg,#00c853,#00e5ff);
  border:none;
  border-radius:30px;
  font-size:18px;
}

/* Slider */
.slider {
  width:100%;
  overflow:hidden;
}

.slides {
  display:flex;
  animation: slide 12s infinite;
}

.slides img {
  width:100%;
  height:300px;
  object-fit:cover;
}

@keyframes slide {
  0% {transform:translateX(0);}
  33% {transform:translateX(-100%);}
  66% {transform:translateX(-200%);}
}

/* Section */
.section {
  padding:50px 20px;
  text-align:center;
}

/* Cards */
.cards {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.card {
  background:rgba(255,255,255,0.1);
  border-radius:20px;
  overflow:hidden;
  backdrop-filter:blur(10px);
  transition:0.3s;
}

.card:hover {
  transform:scale(1.05);
}

.card img {
  width:100%;
  height:200px;
  object-fit:cover;
}

.card p {
  padding:10px;
}

/* Footer */
.footer {
  padding:30px;
  background:#020617;
}

/* WhatsApp */
.whatsapp {
  position:fixed;
  bottom:20px;
  left:20px;
  background:#25D366;
  padding:15px;
  border-radius:50%;
  font-size:25px;
  text-decoration:none;
  color:white;
}
</style>
</head>

<body onclick="playMusic()">

<!-- فيديو -->
<video class="video-bg" autoplay muted loop>
  <source src="https://www.w3schools.com/howto/rain.mp4">
</video>

<!-- صوت -->
<audio id="music" loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<script>
function playMusic(){
 document.getElementById("music").play();
}
</script>

<!-- Navbar -->
<div class="nav">
  <div class="logo">Mahla IFRANE</div>
</div>

<!-- Hero -->
<div class="hero">
  <h1>Mahla IFRANE</h1>
  <button class="btn">احجز الآن</button>
</div>

<!-- Slider -->
<div class="slider">
  <div class="slides">
    <img src="https://images.unsplash.com/photo-1507089947368-19c1da9775ae">
    <img src="https://images.unsplash.com/photo-1560448204-e02f11c3d0e2">
    <img src="https://images.unsplash.com/photo-1522708323590-d24dbb6b0267">
  </div>
</div>

<!-- Section -->
<div class="section">
  <h2>أفضل الشقق</h2>

  <div class="cards">
    <div class="card">
      <img src="https://images.unsplash.com/photo-1560448204-e02f11c3d0e2">
      <p>شقة فاخرة</p>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1522708323590-d24dbb6b0267">
      <p>إطلالة رائعة</p>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1507089947368-19c1da9775ae">
      <p>موقع ممتاز</p>
    </div>
  </div>
</div>

<!-- Map -->
<div class="section">
  <h2>الموقع</h2>
  <iframe src="https://maps.google.com/maps?q=ifrane&t=&z=13&ie=UTF8&iwloc=&output=embed" width="100%" height="300"></iframe>
</div>

<!-- Footer -->
<div class="footer">
  <p>📞 +212674425032</p>
  <p>📞 +212660183251</p>
</div>

<!-- WhatsApp -->
<a class="whatsapp" href="https://wa.me/212674425032">💬</a>

</body>
</html>
